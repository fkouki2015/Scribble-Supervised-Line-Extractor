<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>セットアップ</title>
  <style>
    /* ===== デザイントークン（ダークモード） ===== */
    :root {
      font-family: 'Inter', system-ui, -apple-system, Helvetica, Arial, sans-serif;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      color-scheme: light dark;

      --color-bg:           #16181d;
      --color-surface:      #1e2128;
      --color-surface-2:    #262932;
      --color-border:       rgba(255,255,255,0.09);
      --color-text:         #b2b6bf;
      --color-text-muted:   #828998;
      --color-text-strong:  #e8eaf0;
      --color-accent:       rgb(92,124,250);
      --color-accent-2:     #3b5bdb;
      --color-danger:       rgb(255,107,107);
      --color-shadow:       rgba(0,0,0,0.4);
      --color-log-bg:       #0e1014;
      --color-log-border:   rgba(255,255,255,0.06);
    }
    /* ===== ライトモード ===== */
    @media (prefers-color-scheme: light) {
      :root {
        --color-bg:           #f0f2f5;
        --color-surface:      #ffffff;
        --color-surface-2:    #f4f6f9;
        --color-border:       rgba(0,0,0,0.09);
        --color-text:         #374151;
        --color-text-muted:   #858c98;
        --color-text-strong:  #111827;
        --color-accent:       #4c6ef5;
        --color-accent-2:     #3b5bdb;
        --color-danger:       #e03131;
        --color-shadow:       rgba(28,39,71,0.12);
        --color-log-bg:       #f8f9fb;
        --color-log-border:   rgba(0,0,0,0.07);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      background: linear-gradient(90deg, var(--color-accent) 0%, var(--color-danger) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 12px;
      color: var(--color-text);
      line-height: 1.6;
      padding: 10px 14px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 10px;
    }

    .log-wrap {
      flex: 1;
      background: var(--color-log-bg);
      border: 1px solid var(--color-log-border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .log-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      padding: 7px 12px 6px;
      border-bottom: 1px solid var(--color-log-border);
      background: var(--color-surface-2);
      border-radius: 10px 10px 0 0;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      font-family: 'Consolas', 'Cascadia Code', 'SF Mono', monospace;
      font-size: 11px;
      line-height: 1.6;
      color: var(--color-text);
      background: var(--color-surface-2);
    }
    #log::-webkit-scrollbar { width: 5px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 99px;
    }

    .entry { word-break: break-all; }
    .entry.error { color: var(--color-danger); }
    .entry.success { color: var(--color-accent); }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    button {
      padding: 7px 20px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: opacity 0.15s, background 0.15s;
    }
    #retry-btn {
      display: none;
      background: var(--color-accent);
      color: #fff;
    }
    #retry-btn:hover { background: var(--color-accent-2); }
    #retry-btn:disabled { opacity: 0.45; cursor: default; }

    * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">Scribble-Supervised Line Extractor セットアップ</span>
  </div>

  <p class="subtitle">
    Python 依存パッケージをインストールします。<br>
    ダウンロードに数分かかる場合があります。
  </p>

  <div class="log-wrap">
    <div class="log-label">ログ</div>
    <div id="log"></div>
  </div>

  <div class="actions">
    <button id="retry-btn" onclick="retry()">再試行</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron')
    const logEl = document.getElementById('log')
    const retryBtn = document.getElementById('retry-btn')

    function appendLog(msg, cls) {
      if (!msg) return
      msg.split('\n').forEach(line => {
        if (!line.trim()) return
        const el = document.createElement('div')
        el.className = 'entry' + (cls ? ' ' + cls : '')
        el.textContent = line
        logEl.appendChild(el)
      })
      logEl.scrollTop = logEl.scrollHeight
    }

    ipcRenderer.on('setup-log', (_, msg) => appendLog(msg, ''))
    ipcRenderer.on('setup-error', () => {
      appendLog('セットアップに失敗しました。再試行するか、アプリを再起動してください。', 'error')
      retryBtn.style.display = 'inline-block'
    })

    async function retry() {
      retryBtn.disabled = true
      retryBtn.style.display = 'none'
      appendLog('--- 再試行中 ---', '')
      await ipcRenderer.invoke('retry-setup')
    }
  </script>
</body>
</html>
